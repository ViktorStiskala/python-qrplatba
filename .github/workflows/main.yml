name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:

concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint & format"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Check lock file
        run: uv lock --check

      - name: Run pre-commit hooks
        run: uvx pre-commit run --all-files

      - name: Check for clean working tree
        run: git diff --exit-code --stat HEAD

  tests:
    name: "Python ${{ matrix.python-version }}${{ matrix.extras != '' && format(' [{0}]', matrix.extras) || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        extras: ["", "png"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Build package
        run: uv build --wheel --quiet

      - name: Install package and test dependencies
        run: |
          uv venv test-env --python ${{ matrix.python-version }}
          WHEEL=$(ls dist/*.whl)
          if [ -n "${{ matrix.extras }}" ]; then
            uv pip install --python test-env "${WHEEL}[${{ matrix.extras }}]"
          else
            uv pip install --python test-env "${WHEEL}"
          fi
          uv export --only-group test | uv pip install --python test-env -r -

      - name: Run pytest
        run: test-env/bin/pytest tests/ -v

  check:
    name: All checks passed
    if: always()
    needs: [lint, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.tests.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
