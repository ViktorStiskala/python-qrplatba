name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:

concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint & format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Check lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --group lint

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Check for clean working tree
        run: git diff --exit-code --stat HEAD

  tests:
    name: "Python ${{ matrix.python-version }}${{ matrix.extras != '' && format(' [{0}]', matrix.extras) || '' }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        extras: ["", "png"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Build package
        run: uv build --wheel --quiet

      - name: Install package and test dependencies
        run: |
          uv venv test-env --python ${{ matrix.python-version }}
          WHEEL=$(ls dist/*.whl)
          if [ -n "${{ matrix.extras }}" ]; then
            uv pip install --python test-env "${WHEEL}[${{ matrix.extras }}]"
          else
            uv pip install --python test-env "${WHEEL}"
          fi
          uv pip install --python test-env "pytest>=8.3" "pytest-github-actions-annotate-failures>=0.3"

      - name: Run pytest
        run: test-env/bin/pytest tests/ -v
